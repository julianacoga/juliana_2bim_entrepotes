<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Entrepotes</title>
</head>

<body>

    <header>
        <div class="logo">
            <img src="img/logo.png" alt="Entrepotes">
        </div>
    </header>

    <main>
        <section class="boas-vindas">
            <h2>Bem-vindo à Entrepotes!</h2>
            <p>Descubra geleias artesanais produzidas com frutas selecionadas, receitas tradicionais e muito carinho.</p>
        </section>

        <section id="geleias">
            <h2>Conheça nossas geleias</h2>
            <div class="cards-geleias">
                <!-- cards vem aquiii -->
            </div>
        </section>

        <section id="categorias">
            <h2>Navegue por Categoria</h2>

            <div class="btnCategoria">
                <button onclick="listarTradicionais()">Tradicionais</button>
                <button onclick="listarTropicais()">Tropicais</button>
                <button onclick="listarVermelhas()">Frutas Vermelhas</button>
                <button onclick="listarCitricas()">Cítricas</button>
                <button onclick="listarTodas()">Todas</button>
            </div>
        </section>

    </main>

    <footer>
        Desenvolvido por Juliana Coga de Jesus Cristo
    </footer>

    <script>
        // Lista as geleias quando abre o site
        async function carregarGeleias() {
            try {
                const response = await fetch("http://localhost:3001/geleias");
                const data = await response.json();
                mostrarGeleias(data.geleias);
            } catch (error) {
                console.log(error);
            }
        }
        carregarGeleias();

            function mostrarGeleias(geleias) {
                const container = document.querySelector(".cards-geleias");
                container.innerHTML = "";

                geleias.forEach(geleia => {
                    const card = document.createElement("a");
                    card.href = "#";
                    card.classList.add("card");

                    card.innerHTML = `
                        <img class="imgCard" src="img/${geleia.imagem}" alt="${geleia.nome}">
                        <h3>${geleia.nome}</h3>
                        <p>${geleia.peso}g</p>
                        <p>${geleia.categoria}</p>
                        <span>R$ ${Number(geleia.preco).toFixed(2)}</span>
                    `;

                    card.addEventListener("click", (e) => {
                        e.preventDefault();
                        console.log(geleia.id);
                    });

                    container.appendChild(card);
                });
            }

            async function listarTradicionais() {
                try {
                    const response = await fetch("http://localhost:3001/geleias/categoria/3");
                    const data = await response.json();
                    mostrarGeleias(data.geleias);
                } catch (error) {
                    console.log(error);
                }
            }

            async function listarTropicais() {
                try {
                    const response = await fetch("http://localhost:3001/geleias/categoria/2");
                    const data = await response.json();
                    mostrarGeleias(data.geleias);
                } catch (error) {
                    console.log(error);
                }
            }

            async function listarVermelhas() {
                try {
                    const response = await fetch("http://localhost:3001/geleias/categoria/1");
                    const data = await response.json();
                    mostrarGeleias(data.geleias);
                } catch (error) {
                    console.log(error);
                }
            }

            async function listarCitricas() {
                try {
                    const response = await fetch("http://localhost:3001/geleias/categoria/4");
                    const data = await response.json();
                    mostrarGeleias(data.geleias);
                } catch (error) {
                    console.log(error);
                }
            }

            async function listarTodas() {
                try {
                    const response = await fetch("http://localhost:3001/geleias");
                    const data = await response.json();
                    mostrarGeleias(data.geleias);
                } catch (error) {
                    console.log(error);
                }
            }

    </script>

</body>
</html>
